<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Sora:wght@800&amp;family=Inter:wght@500&amp;display=swap');</style>
    <radialGradient id="rg" cx="75%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0f1e2e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0f1e2e"/>
  <rect width="1584" height="396" fill="url(#rg)"/>

  <!-- Large ghosted icon watermark (left side — sits behind LinkedIn logo overlay) -->
  <g opacity="0.07" transform="translate(55, 28)">
    <rect width="320" height="320" rx="64" fill="#2563eb"/>
    <path d="M87 288 L136 152 L103 152 L152 65"
          fill="none" stroke="white" stroke-width="19"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Logo icon (52×52) — right content block -->
  <rect x="780" y="44" width="52" height="52" rx="11" fill="#2563eb"/>
  <path d="M796 91 L805 72 L799 72 L808 56"
        fill="none" stroke="white" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Logo brand name -->
  <text x="846" y="82" font-family="'Sora','Arial Black',Arial,sans-serif" font-weight="800" font-size="28" letter-spacing="-0.03em" fill="#ffffff">Spiff</text>
  <text x="929" y="82" font-family="'Sora','Arial Black',Arial,sans-serif" font-weight="800" font-size="28" letter-spacing="-0.03em" fill="#2563eb">RevOps</text>

  <!-- Tagline line 1 -->
  <text x="780" y="193" font-family="'Sora','Arial Black',Arial,sans-serif" font-weight="800" font-size="56" letter-spacing="-0.04em" fill="#ffffff">Spiff Implementations.</text>

  <!-- Tagline line 2 -->
  <text x="780" y="263" font-family="'Sora','Arial Black',Arial,sans-serif" font-weight="800" font-size="56" letter-spacing="-0.04em"><tspan fill="#ffffff">Done Right. </tspan><tspan fill="#2563eb">Done Fast.</tspan></text>

  <!-- Website URL -->
  <text x="780" y="320" font-family="'Inter',Arial,sans-serif" font-weight="500" font-size="22" fill="#60a5fa">spiffrevops.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="384" width="1584" height="12" fill="#2563eb"/>
</svg>
