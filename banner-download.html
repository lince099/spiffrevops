<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download LinkedIn Banner</title>
  <style>
    body { margin: 40px; font-family: Arial, sans-serif; background: #f5f5f5; }
    h2 { margin-bottom: 8px; }
    p  { color: #555; margin-bottom: 24px; }
    button {
      padding: 14px 32px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    canvas { display: none; }
    #preview {
      margin-top: 32px;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>SpiffRevOps LinkedIn Banner</h2>
  <p>Click below to download the banner as a PNG (1584 × 396 px) — ready to upload to LinkedIn.</p>
  <button onclick="downloadPNG()">Download PNG</button>
  <br>
  <canvas id="c"></canvas>
  <img id="preview" alt="Banner preview will appear here"/>

  <script>
    const SVG_URL = 'linkedin-banner.svg';
    const W = 1584, H = 396;

    function downloadPNG() {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        const canvas = document.getElementById('c');
        canvas.width  = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);

        // Show preview
        document.getElementById('preview').src = canvas.toDataURL('image/png');

        // Trigger download
        const a = document.createElement('a');
        a.download = 'spiffrevops-linkedin-banner.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      };
      img.src = SVG_URL + '?t=' + Date.now();
    }
  </script>
</body>
</html>
